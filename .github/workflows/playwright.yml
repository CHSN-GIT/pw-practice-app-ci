# nueva solución IA reemplazando npx por otra solución

# En lugar de usar los comandos manuales de consola (npx playwright install), 
# utilizaremos la acción oficial de GitHub mantenida por los creadores de Playwright (microsoft/playwright-actions).
# Esta acción utiliza scripts internos optimizados a nivel de API que no se congelan en los servidores de Ubuntu.

name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci

    # ESTRATEGIA OFICIAL: La acción nativa de Microsoft gestiona la caché y los navegadores de forma segura
    # NO HA FUNCIONADO AL NO ENCONTRAR ESA ACCIÓN... LA REEMPLAZARE CON OTRA OPCIÓN DE IA DE GITHUB
    # - name: Install Playwright Chromium Browser and Deps
      # uses: microsoft/playwright-actions@v1
      # with:
      #   # Forzamos a instalar únicamente chromium para evitar saturar el servidor
      #   browsers: chromium

    # nuevo intento de carga de los navegadores
    # - name: Install Playwright Chromium Browser
    #   run: npx playwright install chromium

    # - name: Install Playwright OS Dependencies
    #   run: npx playwright install-deps chromium

# Cache Playwright browsers to avoid re-downloading (otro intento de la IA por corregir el error en la subida)
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: playwright-${{ runner.os }}-

    - name: Install Playwright Chromium Browser
      run: npx playwright install chromium --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
